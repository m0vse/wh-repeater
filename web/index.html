<!--
  ============================================================================
   wh-repeater - Web Management Markup
  ============================================================================
   Copyright (c) 2026 Phil Taylor (M0VSE)

   Purpose:
     Provides the static management UI shell served by nginx and connected
     to the daemon localhost API through the browser application script.

   Project notes:
     wh-repeater is a fresh C++ daemon for a Winterhill-derived DVB repeater.
     This static UI talks to the daemon REST API through the nginx front end.
  ============================================================================
-->

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WH Repeater</title>
  <link rel="stylesheet" href="/styles.css?v=20260612-header-status">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>WH Repeater</h1>
      <p id="api-state">Connecting</p>
    </div>
    <div class="header-status" id="save-state" aria-live="polite"></div>
    <div class="actions">
      <button id="refresh" type="button">Refresh</button>
      <button id="service-restart" type="button">Restart</button>
      <button id="save" type="button" class="primary">Save Config</button>
    </div>
  </header>

  <main>
    <section class="status-grid" id="status-grid"></section>
    <section class="panel tx-panel" id="tx-status-panel"></section>

    <section class="panel">
      <div class="panel-head">
        <h2>Repeater Config</h2>
      </div>

      <div class="config-sections">
        <section class="config-section">
          <h3>Signal Selection</h3>
          <div class="form-grid compact">
            <label>
              Status interval ms
              <input id="status-interval" type="number" min="100" step="100">
            </label>
            <label>
              Minimum MER dB
              <input id="minimum-mer" type="number" step="0.1">
            </label>
            <label>
              Minimum D-number dB
              <input id="minimum-dnumber" type="number" step="0.1">
            </label>
          </div>
        </section>

        <section class="config-section">
          <h3>Pluto Output</h3>
          <div class="form-grid">
            <label class="check">
              <input id="pluto-mqtt-enabled" type="checkbox">
              Pluto MQTT enabled
            </label>
            <label>
              Pluto callsign
              <input id="pluto-callsign" type="text">
            </label>
            <label>
              Pluto MQTT protocol
              <select id="pluto-mqtt-protocol">
                <option value="pluto-ori">Pluto ORI</option>
                <option value="tezuka">Tezuka</option>
              </select>
            </label>
            <label>
              Pluto MQTT device ID
              <input id="pluto-mqtt-device-id" type="text" placeholder="defaults to callsign">
            </label>
            <label>
              Pluto TS address
              <input id="pluto-address" type="text">
            </label>
            <label>
              Pluto TS port
              <input id="pluto-port" type="number" min="1" max="65535">
            </label>
            <label>
              Pluto MQTT host
              <input id="pluto-mqtt-host" type="text">
            </label>
            <label>
              Pluto MQTT port
              <input id="pluto-mqtt-port" type="number" min="1" max="65535">
            </label>
            <label>
              TX frequency Hz
              <input id="pluto-tx-frequency" type="number" min="1">
            </label>
            <label>
              Transmit system
              <select id="pluto-system">
                <option value="dvbs2">DVB-S2</option>
                <option value="dvbs">DVB-S</option>
              </select>
            </label>
            <label>
              TX symbol rate S/s
              <input id="pluto-symbol-rate" type="number" min="1">
            </label>
            <label>
              TX gain dB
              <input id="pluto-gain" type="number">
            </label>
            <label>
              NCO Hz
              <input id="pluto-nco" type="number">
            </label>
            <label>
              Transmit FEC
              <select id="pluto-fec">
                <option value="1/2">1/2</option>
                <option value="1/4">1/4</option>
                <option value="1/3">1/3</option>
                <option value="2/5">2/5</option>
                <option value="3/5">3/5</option>
                <option value="2/3">2/3</option>
                <option value="3/4">3/4</option>
                <option value="4/5">4/5</option>
                <option value="5/6">5/6</option>
                <option value="7/8">7/8</option>
                <option value="8/9">8/9</option>
                <option value="9/10">9/10</option>
              </select>
            </label>
            <label>
              Constellation
              <select id="pluto-constellation">
                <option value="qpsk">QPSK</option>
                <option value="8psk">8PSK</option>
                <option value="16apsk">16APSK</option>
                <option value="32apsk">32APSK</option>
              </select>
            </label>
            <label>
              DVB-S2 frame
              <select id="pluto-frame">
                <option value="long">Long</option>
                <option value="short">Short</option>
              </select>
            </label>
            <label>
              FEC mode
              <select id="pluto-fec-mode">
                <option value="fixed">Fixed</option>
                <option value="variable">Variable</option>
              </select>
            </label>
            <label class="check">
              <input id="pluto-pilots" type="checkbox">
              DVB-S2 pilots
            </label>
            <label class="check">
              <input id="hardware-ptt-enabled" type="checkbox">
              Hardware PTT enabled
            </label>
            <label>
              PTT GPIO chip
              <input id="hardware-ptt-chip" type="text" value="/dev/gpiochip0">
            </label>
            <label>
              PTT GPIO line
              <input id="hardware-ptt-line" type="number" min="0" value="0">
            </label>
            <label class="check">
              <input id="hardware-ptt-active-high" type="checkbox">
              PTT active high
            </label>
          </div>
        </section>

        <section class="config-section">
          <h3>Media Pipeline</h3>
          <div class="config-subsections">
            <div class="config-subsection">
              <h4>Output</h4>
              <div class="form-grid">
                <label>
                  Calculated mux rate kbps
                  <input id="mux-rate" type="number" min="1" readonly>
                </label>
                <label>
                  Calculated video bitrate kbps
                  <input id="video-bitrate" type="number" min="1" readonly>
                </label>
                <label>
                  Audio bitrate kbps
                  <input id="audio-bitrate" type="number" min="1">
                </label>
                <label>
                  Media backend
                  <select id="media-backend">
                    <option value="ffmpeg">FFmpeg</option>
                    <option value="gstreamer">GStreamer</option>
                  </select>
                </label>
                <label>
                  Output width
                  <input id="output-width" type="number" min="320" max="1920" step="2">
                </label>
                <label>
                  Output height
                  <input id="output-height" type="number" min="240" max="1080" step="2">
                </label>
                <label>
                  Output fps
                  <input id="output-frame-rate" type="number" min="1" max="50">
                </label>
                <label>
                  H.264 profile
                  <select id="h264-profile">
                    <option value="baseline">Baseline</option>
                    <option value="main">Main</option>
                    <option value="high">High</option>
                  </select>
                </label>
                <label>
                  H.264 level
                  <select id="h264-level">
                    <option value="auto">Auto</option>
                    <option value="3">3</option>
                    <option value="3.1">3.1</option>
                    <option value="4">4</option>
                  </select>
                </label>
                <label class="wide">
                  Watermark text
                  <input id="watermark-text" type="text">
                </label>
              </div>
            </div>

            <div class="config-subsection">
              <h4>Fallback</h4>
              <div class="form-grid">
                <label>
                  Fallback timeout ms
                  <input id="fallback-timeout" type="number" min="0">
                </label>
                <label>
                  Slide duration seconds
                  <input id="fallback-slide-duration" type="number" min="1" value="10">
                </label>
                <label class="check">
                  <input id="fallback-enabled" type="checkbox">
                  Fallback enabled
                </label>
                <label class="check">
                  <input id="fallback-hardware-decode" type="checkbox">
                  Try hardware decode
                </label>
                <label class="wide">
                  Slide folder
                  <input id="fallback-slide-directory" type="text" placeholder="/var/lib/wh-repeater/slides">
                </label>
                <label class="wide">
                  Christmas slide folder
                  <input id="fallback-xmas-slide-directory" type="text" placeholder="/var/lib/wh-repeater/slides/christmas">
                </label>
                <label class="wide">
                  Fallback video folder
                  <input id="fallback-video-directory" type="text" placeholder="/home/pi/Videos">
                </label>
                <label class="wide">
                  Fallback video
                  <select id="fallback-video-select"></select>
                </label>
                <div class="actions wide">
                  <button id="fallback-play-video" type="button">Play selected fallback video</button>
                  <button id="fallback-stop-video" type="button">Stop fallback video</button>
                </div>
              </div>
            </div>

            <div class="config-subsection">
              <h4>RTMP</h4>
              <div class="form-grid compact">
                <label class="check">
                  <input id="rtmp-enabled" type="checkbox">
                  RTMP streaming enabled
                </label>
                <label class="wide">
                  RTMP URL
                  <input id="rtmp-url" type="text" placeholder="rtmp://server/live/stream-key">
                </label>
              </div>
            </div>
          </div>
        </section>

        <section class="config-section">
          <h3>Beacon Schedule (UTC)</h3>
          <div class="form-grid compact">
            <label class="check">
              <input id="beacon-schedule-enabled" type="checkbox">
              Schedule enabled
            </label>
            <label>
              Start time UTC
              <input id="beacon-start-time" type="time">
            </label>
            <label>
              End time UTC
              <input id="beacon-end-time" type="time">
            </label>
          </div>
        </section>

        <section class="config-section">
          <h3>Ident</h3>
          <div class="form-grid compact">
            <label class="check">
              <input id="ident-enabled" type="checkbox">
              Ident enabled
            </label>
            <label class="wide">
              Service name
              <input id="service-name" type="text">
            </label>
            <label>
              Ident interval seconds
              <input id="ident-interval" type="number" min="0">
            </label>
            <label>
              Morse tone Hz
              <input id="ident-morse-tone" type="number" min="100" max="3000" value="650">
            </label>
            <label>
              Morse WPM
              <input id="ident-morse-wpm" type="number" min="5" max="40" value="10">
            </label>
          </div>
        </section>

        <section class="config-section">
          <h3>Analogue USB Capture</h3>
          <div class="form-grid">
            <label class="check">
              <input id="analogue-capture-enabled" type="checkbox">
              Analogue capture enabled
            </label>
            <label>
              Receiver ID
              <input id="analogue-capture-receiver-id" type="number" min="1" value="5">
            </label>
            <label>
              Device ID
              <input id="analogue-capture-device-id" type="text" value="usb-capture">
            </label>
            <label>
              Label
              <input id="analogue-capture-label" type="text" value="USB analogue">
            </label>
            <label>
              Capture device
              <input id="analogue-capture-device" type="text" value="/dev/video0">
            </label>
            <label>
              Capture width
              <input id="analogue-capture-width" type="number" min="160" max="1920" value="720">
            </label>
            <label>
              Video standard
              <select id="analogue-capture-standard">
                <option value="pal">PAL</option>
                <option value="ntsc">NTSC</option>
                <option value="secam">SECAM</option>
              </select>
            </label>
            <label>
              Capture height
              <input id="analogue-capture-height" type="number" min="120" max="1080" value="576">
            </label>
            <label>
              Capture fps
              <input id="analogue-capture-frame-rate" type="number" min="1" max="50" value="25">
            </label>
            <label>
              FPS numerator
              <input id="analogue-capture-frame-rate-numerator" type="number" min="1" max="60000" value="25">
            </label>
            <label>
              FPS denominator
              <input id="analogue-capture-frame-rate-denominator" type="number" min="1" max="1001" value="1">
            </label>
            <label>
              Lock mode
              <select id="analogue-capture-lock-mode">
                <option value="manual">Manual/device present</option>
                <option value="device-present">Device present</option>
                <option value="v4l2-sync">V4L2 sync</option>
                <option value="gpio">GPIO lock</option>
              </select>
            </label>
            <label>
              Lock GPIO chip
              <input id="analogue-capture-gpio-chip" type="text" value="/dev/gpiochip0">
            </label>
            <label>
              Lock GPIO line
              <input id="analogue-capture-gpio-line" type="number" min="0" value="26">
            </label>
            <label class="check">
              <input id="analogue-capture-gpio-active-high" type="checkbox" checked>
              Lock active high
            </label>
          </div>
        </section>

        <section class="config-section" hidden>
          <h3>SD1 Analogue Input</h3>
          <div class="form-grid">
            <label class="check">
              <input id="sd1-enabled" type="checkbox">
              SD1 enabled
            </label>
            <label>
              SD1 I2C device
              <input id="sd1-i2c-device" type="text" value="/dev/i2c-0">
            </label>
            <label>
              SD1 I2C address
              <input id="sd1-i2c-address" type="number" min="0" max="127" value="64">
            </label>
            <label>
              SD1 receiver ID
              <input id="sd1-receiver-id" type="number" min="1" value="5">
            </label>
            <label>
              SD1 device ID
              <input id="sd1-device-id" type="text" value="sd1">
            </label>
            <label>
              SD1 source
              <select id="sd1-source">
                <option value="auto">Auto</option>
                <option value="video1">Video 1</option>
                <option value="video2">Video 2</option>
                <option value="video3">Video 3</option>
                <option value="svideo">S-Video</option>
                <option value="component">Component</option>
              </select>
            </label>
            <label>
              SD1 capture device
              <input id="sd1-capture-device" type="text" value="/dev/video0">
            </label>
            <label>
              SD1 capture width
              <input id="sd1-capture-width" type="number" min="160" max="1920" value="640">
            </label>
            <label>
              SD1 capture height
              <input id="sd1-capture-height" type="number" min="120" max="1080" value="480">
            </label>
            <label>
              SD1 capture fps
              <input id="sd1-capture-frame-rate" type="number" min="1" max="50" value="25">
            </label>
          </div>
        </section>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>NIM Scan Plan</h2>
      </div>
      <div id="receivers"></div>
    </section>
  </main>

  <template id="receiver-template">
    <article class="receiver">
      <div class="receiver-head">
        <strong class="receiver-physical"></strong>
        <label>
          RX
          <input class="receiver-id" type="number" min="1" max="4" readonly>
        </label>
        <label class="check">
          <input class="receiver-enabled" type="checkbox">
          Enabled
        </label>
        <label>
          Dwell ms
          <input class="receiver-dwell" type="number" min="100" step="100">
        </label>
        <label>
          Hang ms
          <input class="receiver-hang" type="number" min="0" step="100">
        </label>
        <button class="add-target" type="button">Add Target</button>
      </div>
      <div class="targets"></div>
    </article>
  </template>

  <template id="target-template">
    <div class="target">
      <label>
        Label
        <input class="target-label" type="text">
      </label>
      <label>
        Frequency kHz
        <input class="target-frequency" type="number" min="0">
      </label>
      <label>
        Symbol rate kS
        <input class="target-symbol-rate" type="number" min="0">
      </label>
      <label>
        LO kHz
        <input class="target-lo" type="number" min="0">
      </label>
      <label>
        System
        <select class="target-system">
          <option value="auto">Auto</option>
          <option value="dvbs">DVB-S</option>
          <option value="dvbs2">DVB-S2</option>
        </select>
      </label>
      <label>
        FEC
        <select class="target-fec">
          <option value="auto">Auto</option>
          <option value="1/4">1/4</option>
          <option value="1/3">1/3</option>
          <option value="2/5">2/5</option>
          <option value="1/2">1/2</option>
          <option value="3/5">3/5</option>
          <option value="2/3">2/3</option>
          <option value="3/4">3/4</option>
          <option value="4/5">4/5</option>
          <option value="5/6">5/6</option>
          <option value="7/8">7/8</option>
          <option value="8/9">8/9</option>
          <option value="9/10">9/10</option>
        </select>
      </label>
      <button class="remove-target" type="button">Remove</button>
    </div>
  </template>

  <script src="/app.js?v=20260612-status-timeout" defer></script>
</body>
</html>
