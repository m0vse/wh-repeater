<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="slate testcard">
    <section class="testcard-bars">
      <div class="tc-white"></div>
      <div class="tc-yellow"></div>
      <div class="tc-cyan"></div>
      <div class="tc-green"></div>
      <div class="tc-magenta"></div>
      <div class="tc-red"></div>
      <div class="tc-blue"></div>
    </section>
    <section class="testcard-row">
      <div class="tc-blue"></div>
      <div class="tc-black"></div>
      <div class="tc-magenta"></div>
      <div class="tc-black"></div>
      <div class="tc-cyan"></div>
      <div class="tc-black"></div>
      <div class="tc-white"></div>
    </section>
    <section class="testcard-pluge">
      <div class="tc-neg-i"></div>
      <div class="tc-white"></div>
      <div class="tc-pos-q"></div>
      <div class="tc-black"></div>
      <div class="tc-pluge-dark"></div>
      <div class="tc-pluge-dim"></div>
      <div class="tc-pluge-bright"></div>
      <div class="tc-black"></div>
    </section>
    <div class="testcard-ident">{{callsign}}</div>
  </main>
</body>
</html>
