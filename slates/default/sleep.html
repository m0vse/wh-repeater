<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="slate">
    <h1 class="title">Power Saving Mode</h1>
    <p class="status">sleeping between {{sleep_end}} and {{sleep_start}}</p>
    <section class="details">
      <div>The repeater can be woken during this time</div>
      <div>with a video signal on any input.</div>
      <div class="muted">Back to sleep after access.</div>
    </section>
  </main>
</body>
</html>
